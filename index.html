<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌娃运动打卡</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: #f7faff;
            padding: 24px 16px;
            max-width: 820px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2563eb;
            font-size: 26px;
            margin-bottom: 12px;
        }
        .tip-text {
            text-align: center;
            font-size: 15px;
            margin-bottom: 20px;
            min-height: 22px;
        }
        .tip-success {color: #16a34a;}
        .tip-error {color: #ef4444;}
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 10px 16px;
            background: white;
            border-radius: 10px;
        }
        .logout-btn {
            padding: 6px 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .admin-table th,
        .admin-table td {
            border-bottom: 1px solid #e2e8f0;
            padding: 10px 8px;
            text-align: left;
            vertical-align: middle;
        }
        .admin-table th {color: #64748b; font-weight: 600;}
        .admin-table input[type="text"],
        .admin-table input[type="password"] {
            width: 100%;
            min-width: 100px;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }
        .admin-save-btn {
            padding: 8px 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
        }
        .top-btn-row {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
        }
        .top-btn-row button {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            cursor: pointer;
            color: white;
            background: #60a5fa;
        }
        .top-btn-row button.active {background: #2563eb;}
        .card {
            background: white;
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1e293b;
            text-align:center;
        }
        .form-item {margin-bottom: 16px;}
        .form-item label {
            display: block;
            font-size: 15px;
            color: #334155;
            margin-bottom: 8px;
        }
        .form-item input, .form-item select, .form-item textarea {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
        }
        .submit-cloud-btn {
            width: 100%;
            padding: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
        }
        .action-btn {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            color: white;
        }
        .blue-btn {background: #2563eb;}
        .red-btn {background: #ef4444;}
        .green-btn {background: #16a34a;}
        .person-mode-btn {background: #86efac; color: #14532d;}
        .person-mode-btn.active {background: #15803d; color: #fff;}
        .sport-type-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        .sport-type-row select {flex: 1;}
        .sport-type-add-btn {
            flex: 0 0 auto;
            padding: 0 16px;
            white-space: nowrap;
        }
        .list-item {
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item-with-check {
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .del-btn {
            padding: 8px 16px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .edit-btn {
            padding: 8px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .record-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
        }
        .detail-toolbar {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .detail-toolbar-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .detail-toolbar-row label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #334155;
            margin: 0;
        }
        .detail-toolbar select,
        .detail-toolbar input[type="date"] {
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
        }
        .detail-date-group {
            border: 1px solid #dbeafe;
            border-radius: 12px;
            margin-bottom: 14px;
            overflow: hidden;
            background: #f8fbff;
        }
        .detail-date-title {
            padding: 10px 14px;
            background: #eff6ff;
            color: #1d4ed8;
            font-weight: 600;
            font-size: 15px;
            border-bottom: 1px solid #dbeafe;
        }
        .detail-date-group .list-item-with-check {
            margin: 0;
            border: none;
            border-radius: 0;
            border-bottom: 1px solid #e2e8f0;
            background: #fff;
        }
        .detail-date-group .list-item-with-check:last-child {
            border-bottom: none;
        }
        .modal-mask {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-mask.open {display: flex;}
        .modal-card {
            width: min(520px, 100%);
            max-height: 90vh;
            overflow: auto;
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.18);
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .modal-actions button {flex: 1;}
        .cancel-btn {
            padding: 14px 0;
            background: #e2e8f0;
            color: #334155;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .check-item {width: 18px;height: 18px;cursor: pointer;}
        .tab-panel {display: none;}
        .tab-panel.active {display: block;}
        .login-card {max-width: 420px;margin: 60px auto 0;}
        .chart-wrap {
            position: relative;
            width: 100%;
            height: min(32vh, 220px);
            max-height: 220px;
            margin-bottom: 8px;
        }
        .chart-wrap canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .chart-switch-btn {
            padding: 6px 12px;
            margin-bottom: 8px;
            margin-right: 6px;
            border: 1px solid #2563eb;
            background: white;
            color: #2563eb;
            border-radius: 6px;
            cursor: pointer;
        }
        .chart-switch-btn.active {background: #2563eb;color: white;}
        .day-range-bar {
            display:flex;
            flex-wrap:wrap;
            align-items:center;
            gap:8px;
            margin-bottom:12px;
        }
        .day-range-custom {
            display:flex;
            flex-wrap:wrap;
            align-items:center;
            gap:6px;
            margin-left:auto;
        }
        .day-range-custom input[type="date"] {
            padding:6px 8px;
            border:1px solid #cbd5e1;
            border-radius:6px;
            font-size:14px;
            max-width:138px;
        }
        .day-range-custom .chart-switch-btn {margin:0;}
        .best-score-item {
            padding: 12px;
            border: 1px solid #dbeafe;
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .best-score-name {font-weight: 600;color: #2563eb;margin-bottom: 4px;}
        .optional-tag {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 400;
            margin-left: 4px;
        }
        .sport-type-charts {display:flex;flex-direction:column;gap:16px;}
        .sport-type-chart-block {
            border:1px solid #e2e8f0;
            border-radius:12px;
            padding:12px;
            background:#f8fafc;
        }
        .sport-type-chart-title {
            font-size:15px;
            font-weight:600;
            color:#1e293b;
            margin-bottom:8px;
        }
        .sport-type-chart-wrap {
            position:relative;
            width:100%;
            height:min(28vh,180px);
            max-height:180px;
        }
        .sport-type-chart-wrap canvas {
            width:100% !important;
            height:100% !important;
        }
        .person-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding:12px;
            border:1px solid #dbeafe;
            border-radius:10px;
            margin-bottom:10px;
        }
        .person-active {background:#dbeafe;}
        .share-row {display:flex;gap:8px;margin-top:10px;}
        .share-input {
            flex:1;
            padding:10px;
            border:1px solid #cbd5e1;
            border-radius:8px;
            background:#f1f5f9;
            color:#64748b;
            cursor:default;
            outline:none;
        }
        .switch-tab-text {
            display:block;
            text-align:center;
            margin-top:16px;
            color:#2563eb;
            font-size:16px;
            user-select: none;
            text-decoration:none;
            cursor:pointer;
            background:none;
            border:none;
            width:100%;
            font-family:inherit;
        }
        .collapse-header {
            width:100%;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            background:none;
            border:none;
            cursor:pointer;
            padding:0;
            text-align:left;
            font-family:inherit;
        }
        .collapse-header .card-title {margin-bottom:0;text-align:left;}
        .collapse-brief {flex:1;font-size:14px;color:#64748b;text-align:right;}
        .collapse-arrow {color:#64748b;font-size:12px;transition:transform .2s;}
        .collapse-arrow.open {transform:rotate(180deg);}
        .collapse-body {margin-top:16px;}
    </style>
</head>
<body>
    <h1 id="pageTitle">萌娃运动打卡</h1>
    <div class="tip-text" id="tip"></div>

    <div id="authPanel">
        <div class="card login-card">
            <div class="card-title" style="text-align:center" id="authTitle">账号登录</div>
            <div id="loginForm">
                <div class="form-item">
                    <label>账号</label>
                    <input type="text" id="loginPhone" autocomplete="username" placeholder="手机号或管理员账号">
                </div>
                <div class="form-item">
                    <label>密码</label>
                    <input type="password" id="loginPwd" autocomplete="current-password" placeholder="请输入密码">
                </div>
                <button class="submit-cloud-btn" id="btnLogin">登录</button>
                <button type="button" class="switch-tab-text" id="linkReg">没有账号？去注册</button>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="form-item">
                    <label>手机号</label>
                    <input type="tel" id="regPhone" inputmode="numeric" maxlength="11" autocomplete="username" placeholder="请输入11位手机号">
                </div>
                <div class="form-item">
                    <label>设置密码</label>
                    <input type="password" id="regPwd" autocomplete="new-password" placeholder="设置登录密码">
                </div>
                <div class="form-item">
                    <label>确认密码</label>
                    <input type="password" id="regPwd2" autocomplete="new-password" placeholder="再次输入密码">
                </div>
                <button class="submit-cloud-btn" id="btnRegister">注册账号</button>
                <button type="button" class="switch-tab-text" id="linkLogin">已有账号？去登录</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" style="display:none;">
        <div class="user-bar">
            <span>管理员：<b id="adminUserName">admin</b></span>
            <button class="logout-btn" id="btnAdminLogout">退出登录</button>
        </div>
        <div class="card">
            <div class="card-title">用户账号管理</div>
            <p style="color:#64748b;font-size:14px;margin-bottom:14px;">可查看全部用户账号与密码，并直接修改密码。</p>
            <div id="adminUserListWrap"></div>
        </div>
    </div>

    <div id="mainPanel" style="display:none;">
        <div class="user-bar">
            <span>当前账号：<b id="currentUserName"></b></span>
            <button class="logout-btn" id="btnLogout">退出登录</button>
        </div>

        <div class="card" id="personManageCard">
            <button type="button" class="collapse-header" id="btnTogglePersonManage">
                <span class="card-title">孩子人员管理</span>
                <span class="collapse-brief" id="personManageBrief"></span>
                <span class="collapse-arrow" id="personManageArrow">▼</span>
            </button>
            <div class="collapse-body" id="personManageBody" style="display:none;">
                <div style="display:flex;gap:12px;margin-bottom:16px;">
                    <button class="action-btn person-mode-btn" id="btnCreatePerson" type="button">新建孩子</button>
                    <button class="action-btn person-mode-btn" id="btnBindPerson" type="button">通过ID绑定孩子</button>
                </div>
                <div id="personListWrap"></div>
                <div id="createPersonForm" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid #eee;">
                    <div class="form-item">
                        <label>孩子姓名</label>
                        <input type="text" id="newPersonName" placeholder="输入孩子姓名">
                    </div>
                    <button class="submit-cloud-btn" id="btnSaveNewPerson">创建人员</button>
                </div>
                <div id="bindPersonForm" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid #eee;">
                    <div class="form-item">
                        <label>输入分享的人员ID</label>
                        <input type="text" id="bindPersonIdInput" placeholder="粘贴对方分享的人员ID">
                    </div>
                    <button class="submit-cloud-btn" id="btnDoBind">绑定该孩子</button>
                </div>
            </div>
        </div>

        <div class="top-btn-row">
            <button class="active" data-tab="input">每日打卡录入</button>
            <button data-tab="detail">运动明细记录</button>
            <button data-tab="chart">运动统计报表</button>
        </div>

        <div class="tab-panel active" id="input">
            <div class="card">
                <div class="card-title">添加当日运动项目</div>
                <div class="form-item">
                    <label>打卡日期</label>
                    <input type="date" id="checkDate">
                </div>
                <div class="form-item">
                    <label>运动类型</label>
                    <div class="sport-type-row">
                        <select id="sportType"></select>
                        <button type="button" class="action-btn green-btn sport-type-add-btn" id="btnAddSportType">新增</button>
                    </div>
                </div>
                <div class="form-item">
                    <label>运动时长 (分钟)</label>
                    <input type="number" id="sportTime" placeholder="请输入时长">
                </div>
                <div class="form-item">
                    <label>数量合计 <span class="optional-tag">选填</span></label>
                    <input type="text" id="sportDist" placeholder="可不填，例如：5公里 / 3组" autocomplete="off">
                </div>
                <div class="form-item">
                    <label>最优成绩 <span class="optional-tag">选填</span></label>
                    <input type="text" id="bestScore" placeholder="可不填，本次最佳成绩记录" autocomplete="off">
                </div>
                <div class="form-item">
                    <label>备注 <span class="optional-tag">选填</span></label>
                    <textarea id="sportNote" rows="4" placeholder="孩子运动状态、天气、进步情况（可不填）"></textarea>
                </div>
                <button class="submit-cloud-btn" id="btnAddRecord">保存</button>
            </div>
        </div>

        <div class="tab-panel" id="detail">
            <div class="card">
                <div class="card-title">运动明细记录</div>
                <div class="detail-toolbar">
                    <div class="detail-toolbar-row">
                        <button class="action-btn blue-btn" id="btnExport" type="button">导出到Excel</button>
                        <button class="action-btn red-btn" id="btnBatchDel" type="button">删除选中项</button>
                    </div>
                    <div class="detail-toolbar-row">
                        <label><input type="checkbox" id="detailSelectAll"> 全选</label>
                        <label><input type="checkbox" id="detailMergeByDate" checked> 按日期合并</label>
                    </div>
                    <div class="detail-toolbar-row">
                        <label>运动类型
                            <select id="detailFilterType">
                                <option value="">全部类型</option>
                            </select>
                        </label>
                        <label>开始
                            <input type="date" id="detailStartDate">
                        </label>
                        <label>结束
                            <input type="date" id="detailEndDate">
                        </label>
                    </div>
                </div>
                <div id="detailRecordList"></div>
            </div>
        </div>

        <div class="tab-panel" id="chart">
            <div class="card">
                <div class="card-title">1. 每日运动时长统计</div>
                <div id="dayRangeBtns" class="day-range-bar">
                    <button type="button" class="chart-switch-btn active" data-day-range="7">近7天</button>
                    <button type="button" class="chart-switch-btn" data-day-range="30">近30天</button>
                    <button type="button" class="chart-switch-btn" data-day-range="90">近90天</button>
                    <button type="button" class="chart-switch-btn" data-day-range="all">全部</button>
                    <span class="day-range-custom">
                        <input type="date" id="chartStartDate" title="开始日期">
                        <span style="color:#64748b;font-size:13px;">至</span>
                        <input type="date" id="chartEndDate" title="结束日期">
                        <button type="button" class="chart-switch-btn" id="btnApplyChartRange">筛选</button>
                    </span>
                </div>
                <div class="chart-wrap"><canvas id="dayTimeChart"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title">2. 各运动按日统计</div>
                <div id="sportSummaryWrap" class="sport-type-charts"></div>
            </div>
            <div class="card">
                <div class="card-title">3. 各类运动最优成绩</div>
                <div id="bestScoreWrap"></div>
            </div>
        </div>
    </div>

    <div class="modal-mask" id="editRecordModal" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="editRecordTitle">
            <div class="card-title" id="editRecordTitle">修改运动记录</div>
            <div class="form-item">
                <label>打卡日期</label>
                <input type="date" id="editCheckDate">
            </div>
            <div class="form-item">
                <label>运动类型</label>
                <select id="editSportType"></select>
            </div>
            <div class="form-item">
                <label>运动时长 (分钟)</label>
                <input type="number" id="editSportTime" placeholder="请输入时长">
            </div>
            <div class="form-item">
                <label>数量合计 <span class="optional-tag">选填</span></label>
                <input type="text" id="editSportDist" placeholder="可不填，例如：5公里 / 3组" autocomplete="off">
            </div>
            <div class="form-item">
                <label>最优成绩 <span class="optional-tag">选填</span></label>
                <input type="text" id="editBestScore" placeholder="可不填，本次最佳成绩记录" autocomplete="off">
            </div>
            <div class="form-item">
                <label>备注 <span class="optional-tag">选填</span></label>
                <textarea id="editSportNote" rows="4" placeholder="孩子运动状态、天气、进步情况（可不填）"></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="cancel-btn" id="btnCancelEditRecord">取消</button>
                <button type="button" class="submit-cloud-btn" id="btnSaveEditRecord">保存修改</button>
            </div>
        </div>
    </div>

<script>
    function switchAuthTab(){
        const loginForm = document.getElementById("loginForm");
        const regForm = document.getElementById("registerForm");
        const title = document.getElementById("authTitle");
        if (loginForm.style.display !== "none") {
            loginForm.style.display = "none";
            regForm.style.display = "block";
            title.innerText = "新用户注册";
        } else {
            loginForm.style.display = "block";
            regForm.style.display = "none";
            title.innerText = "账号登录";
        }
    }

    const tipDom = document.getElementById('tip');
    let sportList = [];
    let editingRecordIndex = -1;
    let dayChartRange = 7; // 默认近7天，"all" 全部，"custom" 自定义
    let chartCustomStart = "";
    let chartCustomEnd = "";
    let dayChartInstance = null;
    let sportTypeChartInstances = [];
    let currentUser = "";
    let currentPersonId = "";
    let personManageExpanded = false; // 默认折叠；无孩子时会自动展开
    const isLocalEnv = window.location.protocol === "file:"
        || location.hostname === "localhost"
        || location.hostname === "127.0.0.1";

    const STORAGE_KEYS = {
        loginUser: "sportLoginPhone",
        allUser: "sport_all_user",
        allPersons: "sport_all_persons",
        userBindPersons: (u)=>`sport_bind_${u}`,
        personRecords: (pid)=>`sport_rec_${pid}`,
        lastPerson: (u)=>`sport_last_person_${u}`,
        lastSportType: (u)=>`sport_last_type_${u}`,
        customSportTypes: (u)=>`sport_custom_types_${u}`
    }

    const DEFAULT_SPORT_TYPES = ["跑步","骑自行车","爬山","羽毛球","徒步","游泳","跳绳","跳操"];
    let sportTypeList = DEFAULT_SPORT_TYPES.slice();

    function mergeSportTypes(customTypes){
        const merged = DEFAULT_SPORT_TYPES.slice();
        (customTypes || []).forEach(t => {
            const name = String(t || "").trim();
            if(name && !merged.includes(name)) merged.push(name);
        });
        return merged.sort((a,b)=>a.localeCompare(b,"zh"));
    }
    function findSimilarSportTypes(name, list){
        const target = String(name || "").trim();
        if(!target) return [];
        return (list || []).filter(item => {
            if(item === target) return false;
            return item.includes(target) || target.includes(item);
        });
    }
    async function fetchCustomSportTypes(){
        if(!currentUser || isAdminAccount(currentUser)) return [];
        if(isLocalEnv){
            const local = localStorage.getItem(STORAGE_KEYS.customSportTypes(currentUser));
            return local ? JSON.parse(local) : [];
        }
        const res = await fetch(
            `/api/sport?mode=sportTypes&user=${encodeURIComponent(currentUser)}`,
            { cache: "no-store" }
        );
        if(!res.ok) throw new Error(`服务异常(${res.status})`);
        const json = await res.json();
        return Array.isArray(json.types) ? json.types : [];
    }
    async function saveCustomSportTypes(types){
        if(!currentUser || isAdminAccount(currentUser)) return;
        const cleaned = (types || []).map(t => String(t || "").trim()).filter(Boolean);
        if(isLocalEnv){
            localStorage.setItem(STORAGE_KEYS.customSportTypes(currentUser), JSON.stringify(cleaned));
            return;
        }
        const res = await fetch(`/api/sport?mode=sportTypes&user=${encodeURIComponent(currentUser)}`, {
            method: "POST",
            cache: "no-store",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ mode:"sportTypes", user: currentUser, types: cleaned })
        });
        if(!res.ok) throw new Error(`保存失败(${res.status})`);
        const json = await res.json().catch(() => ({}));
        if(json.success === false) throw new Error(json.error || "保存失败");
    }
    async function initSportTypeSelect(preferredType, customTypesOverride){
        const sel = document.getElementById("sportType");
        if(!sel) return;
        try{
            const customTypes = customTypesOverride !== undefined
                ? customTypesOverride
                : await fetchCustomSportTypes();
            sportTypeList = mergeSportTypes(customTypes);
        }catch(err){
            console.error(err);
            sportTypeList = DEFAULT_SPORT_TYPES.slice().sort((a,b)=>a.localeCompare(b,"zh"));
        }
        const preferred = String(preferredType || "").trim();
        if(preferred && !sportTypeList.includes(preferred)){
            sportTypeList.push(preferred);
            sportTypeList.sort((a,b)=>a.localeCompare(b,"zh"));
        }
        sel.innerHTML = sportTypeList.map(s=>`<option value="${s}">${s}</option>`).join("");
        const last = preferred
            || (currentUser ? localStorage.getItem(STORAGE_KEYS.lastSportType(currentUser)) : "");
        sel.value = (last && sportTypeList.includes(last)) ? last : (sportTypeList[0] || "");
    }
    async function addCustomSportType(){
        if(!currentUser || isAdminAccount(currentUser)){
            setTip("请先登录普通账号后再新增运动类型", true);
            return;
        }
        const raw = prompt("请输入要新增的运动类型名称：");
        if(raw == null) return;
        const name = String(raw).trim();
        if(!name){ setTip("运动类型不能为空", true); return; }
        if(name.length > 20){ setTip("运动类型名称请控制在20字以内", true); return; }

        let customTypes = [];
        try{
            customTypes = await fetchCustomSportTypes();
        }catch(err){
            setTip(`读取运动类型失败：${err.message || "请稍后重试"}`, true);
            return;
        }
        const allTypes = mergeSportTypes(customTypes);
        if(allTypes.includes(name)){
            setTip(`「${name}」已存在，无需重复添加`, true);
            await initSportTypeSelect(name, customTypes);
            return;
        }
        const similar = findSimilarSportTypes(name, allTypes);
        const ok = similar.length
            ? confirm(`已有类似项目：${similar.join("、")}。\n仍要添加「${name}」吗？`)
            : confirm(`确定添加运动类型「${name}」？`);
        if(!ok) return;

        try{
            const nextCustomTypes = customTypes.concat([name]);
            await saveCustomSportTypes(nextCustomTypes);
            // 用本地已确认列表立刻刷新，避免保存后马上读云端拿到旧数据
            await initSportTypeSelect(name, nextCustomTypes);
            localStorage.setItem(STORAGE_KEYS.lastSportType(currentUser), name);
            setTip(`已添加运动类型：${name}`);
        }catch(err){
            console.error(err);
            setTip(`添加失败：${err.message || "请稍后重试"}`, true);
        }
    }

    function getTodayDate() {
        const d = new Date();
        const y = d.getFullYear();
        let m = d.getMonth()+1, day = d.getDate();
        m = m<10?"0"+m:m; day = day<10?"0"+day:day;
        return `${y}-${m}-${day}`;
    }
    function genPersonId(){
        return "PID_"+Date.now()+"_"+Math.floor(Math.random()*1000);
    }
    const ADMIN_USER = "admin";
    const ADMIN_PWD = "admin";

    function isAdminAccount(user){
        return String(user || "").trim() === ADMIN_USER;

    function escapeHtml(text){
        return String(text || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }
    function normalizePhone(phone){
        return String(phone || "").replace(/\D/g, "");
    }
    function checkPhone(phone){
        return /^1[3-9]\d{9}$/.test(phone);
    }

                .filter(([account]) => !isAdminAccount(account))

                            <th style="width:26%">操作</th>

    async function adminSavePassword(phone){
        const row = document.querySelector(`#adminUserListWrap tr[data-phone="${phone}"]`);
        if(!row) return;
        const pwd = row.querySelector(".admin-pwd-input").value.trim();
        if(pwd.length < 6){ setTip("密码至少6位", true); return; }
        try{
            const userMap = await fetchUserMap();
            if(!userMap[phone]){
                setTip("该账号不存在或已被删除", true);
                await renderAdminUserList();
                return;
            }
            userMap[phone] = pwd;
            await saveUserMap(userMap);
            setTip(`已更新 ${phone} 的密码`);
            await renderAdminUserList();
        }catch(err){
            console.error(err);
            setTip(`保存失败：${err.message || "请稍后重试"}`, true);
        }

    async function userRegister(){
        const phone = normalizePhone(document.getElementById("regPhone").value);
        const pwd1 = document.getElementById("regPwd").value.trim();
        const pwd2 = document.getElementById("regPwd2").value.trim();
        if(isAdminAccount(phone) || isAdminAccount(document.getElementById("regPhone").value.trim())){
            setTip("该账号名不可用于注册",true);return;
        }
        if(!checkPhone(phone)){setTip("请输入合法11位手机号",true);return;}
        if(pwd1.length < 6){setTip("密码至少6位",true);return;}
        if(pwd1 !== pwd2){setTip("两次输入密码不一致",true);return;}
        try{
            const userMap = await fetchUserMap();
            if(userMap[phone]){setTip("该手机号已注册，请直接登录",true);return;}
            userMap[phone] = pwd1;
            await saveUserMap(userMap);
            document.getElementById("regPhone").value = "";
            document.getElementById("regPwd").value = "";
            document.getElementById("regPwd2").value = "";
            document.getElementById("loginPhone").value = phone;
            document.getElementById("loginPwd").value = "";
            await enterApp(phone);
            setTip(`注册成功，已自动登录：${phone}`);
        }catch(err){
            console.error(err);
            setTip(`注册失败：${err.message || "请稍后重试"}`,true);
        }
    }

    async function userLogin(){
        const account = document.getElementById("loginPhone").value.trim();
        const pwd = document.getElementById("loginPwd").value.trim();
        if(!account){setTip("请输入账号",true);return;}
        if(!pwd){setTip("请输入密码",true);return;}
        try{
            if(isAdminAccount(account)){
                if(pwd !== ADMIN_PWD){
                    setTip("密码错误，请重新输入",true);
                    return;
                }
                await enterAdmin();
                setTip("管理员登录成功");
                return;
            }
            const phone = normalizePhone(account);
            if(!checkPhone(phone)){setTip("请输入合法11位手机号",true);return;}
            const userMap = await fetchUserMap();
            if(!userMap[phone]){
                setTip("该手机号未注册，请先注册",true);
                return;
            }
            if(userMap[phone] !== pwd){
                setTip("密码错误，请重新输入",true);
                return;
            }
            await enterApp(phone);
            setTip(`登录成功，当前账号：${phone}`);
        }catch(err){
            console.error(err);
            setTip(`登录失败：${err.message || "请稍后重试"}`,true);
        }
    }

    async function fetchPersonData(){
        if(isLocalEnv){
            return {
                allPersons: JSON.parse(localStorage.getItem(STORAGE_KEYS.allPersons) || "[]"),
                bindPids: JSON.parse(localStorage.getItem(STORAGE_KEYS.userBindPersons(currentUser)) || "[]")
            };
        }
        const res = await fetch(`/api/sport?mode=person&user=${encodeURIComponent(currentUser)}`, {
            cache: "no-store"
        });
        if(!res.ok) throw new Error(`服务异常(${res.status})`);
        const json = await res.json();
        return {
            allPersons: json.allPersons || [],
            bindPids: json.bindPids || []
        };
    }

    async function loadAllPersonData(){
        let allPersons = [];
        let bindPids = [];
        try{
            const data = await fetchPersonData();
            allPersons = data.allPersons;
            bindPids = data.bindPids;
        }catch(err){
            console.error(err);
            setTip(`加载孩子列表失败：${err.message || "请稍后重试"}`, true);
            renderPersonList([], []);
            return;
        }
        const bindPersonArr = allPersons.filter(p=>bindPids.includes(p.personId));
        const targetId = resolveDefaultPersonId(bindPersonArr);
        if(targetId){
            currentPersonId = targetId;
            localStorage.setItem(STORAGE_KEYS.lastPerson(currentUser), targetId);
            await loadPersonRecord();
            renderDetailList(); renderAllChart();
        }else{
            currentPersonId = "";
            sportList = [];
            renderDetailList();
        }
        renderPersonList(allPersons, bindPids);
        updatePageTitle();
        if(targetId){
            const name = bindPersonArr.find(p=>p.personId===targetId)?.name || "";
            setTip(`当前孩子：${name}`);
        }else if(bindPersonArr.length===0){
            setTip("暂无孩子，请新建或绑定");
        }else{
            setTip("请选择要操作的孩子");
        }
    }

    function resolveDefaultPersonId(bindPersonArr){
        if(bindPersonArr.length===0) return "";
        if(bindPersonArr.length===1) return bindPersonArr[0].personId;
        const last = localStorage.getItem(STORAGE_KEYS.lastPerson(currentUser));
        if(last && bindPersonArr.some(p=>p.personId===last)) return last;
        if(currentPersonId && bindPersonArr.some(p=>p.personId===currentPersonId)) return currentPersonId;
        return "";
    }

    function renderPersonList(allPersons, bindPids){
        const wrap = document.getElementById("personListWrap");
        const createForm = document.getElementById("createPersonForm");
        const bindForm = document.getElementById("bindPersonForm");
        const bindPersonArr = allPersons.filter(p=>bindPids.includes(p.personId));
        updatePersonManageBrief(bindPersonArr);
        if(bindPersonArr.length===0){
            wrap.innerHTML = "<p style='color:#64748b;'>暂无绑定孩子，请新建或输入ID绑定</p>";
            createForm.style.display = "block";
            bindForm.style.display = "none";
            setPersonManageExpanded(true); // 无孩子时默认展开
            return;
        }
        // 有孩子时默认保持折叠（除非用户已手动展开）
        if(!personManageExpanded) setPersonManageExpanded(false);
        createForm.style.display = "none";
        bindForm.style.display = "none";
        let html = "";
        bindPersonArr.forEach(p=>{
            const isCreator = p.createUser === currentUser;
            const isActive = currentPersonId === p.personId;
            html += `
                <div class="person-item ${isActive?'person-active':''}">
                    <div>
                        <div><b>${p.name}</b> ${isCreator?"(创建人，可分享ID)":"(共享绑定)"}${isActive?" · 当前选中":""}</div>
                        <div style="font-size:13px;color:#666;">人员ID：${p.personId}</div>
                        <div class="share-row">
                            <input class="share-input" value="${p.personId}" readonly tabindex="-1">
                            <button data-pid="${p.personId}">复制ID</button>
                        </div>
                    </div>
                    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">
                        ${isActive
                            ? `<button class="submit-cloud-btn" disabled style="opacity:.55;cursor:default;">当前选中</button>`
                            : `<button class="submit-cloud-btn" data-switch-pid="${p.personId}">选择该孩子</button>`}
                        ${isCreator?`<button class="del-btn" data-del-pid="${p.personId}">删除孩子</button>`:""}
                    </div>
                </div>
            `;
        })
        wrap.innerHTML = html;
        wrap.onclick = function(e){
            const pid = e.target.dataset.pid || e.target.dataset.switchPid || e.target.dataset.delPid;
            if(!pid) return;
            if(e.target.dataset.pid) copyShareId(pid);
            if(e.target.dataset.switchPid) switchCurrentPerson(pid);
            if(e.target.dataset.delPid) deletePerson(pid);
        }

    async function createNewPerson(){
        const name = document.getElementById("newPersonName").value.trim();
        if(!name){setTip("请输入孩子姓名",true);return;}
        const pid = genPersonId();
        const newPerson = {
            personId: pid,
            name: name,
            createUser: currentUser,
            createTime: new Date().toLocaleString()
        };
        try{
            const data = await fetchPersonData();
            let allPersons = data.allPersons || [];
            let bindPids = data.bindPids || [];
            allPersons.push(newPerson);
            bindPids.push(pid);
            if(isLocalEnv){
                localStorage.setItem(STORAGE_KEYS.allPersons, JSON.stringify(allPersons));
                localStorage.setItem(STORAGE_KEYS.userBindPersons(currentUser), JSON.stringify(bindPids));
            }else{
                const saveRes = await fetch("/api/sport?mode=person", {
                    method:"POST",
                    cache: "no-store",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({mode:"person", allPersons, bindPids, user:currentUser})
                });
                if(!saveRes.ok) throw new Error(`保存失败(${saveRes.status})`);
            }
            document.getElementById("newPersonName").value = "";
            document.getElementById("createPersonForm").style.display = "none";
            localStorage.setItem(STORAGE_KEYS.lastPerson(currentUser), pid);
            await loadAllPersonData();
            setTip(`创建成功，人员ID：${pid}，可复制分享给家人`);
        }catch(err){
            console.error(err);
            setTip(`创建失败：${err.message || "请稍后重试"}`, true);
        }
    }

    async function bindPerson(){
        const pid = document.getElementById("bindPersonIdInput").value.trim();
        if(!pid){setTip("请输入人员ID",true);return;}
        try{
            const data = await fetchPersonData();
            let allPersons = data.allPersons || [];
            const target = allPersons.find(p=>p.personId === pid);
            if(!target){setTip("该人员ID不存在，请核对",true);return;}
            let bindPids = data.bindPids || [];
            if(bindPids.includes(pid)){setTip("你已绑定该孩子，无需重复操作",true);return;}
            bindPids.push(pid);
            if(isLocalEnv){
                localStorage.setItem(STORAGE_KEYS.userBindPersons(currentUser), JSON.stringify(bindPids));
            }else{
                const saveRes = await fetch("/api/sport?mode=person", {
                    method:"POST",
                    cache: "no-store",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({mode:"person", allPersons, bindPids, user:currentUser})
                });
                if(!saveRes.ok) throw new Error(`保存失败(${saveRes.status})`);
            }
            document.getElementById("bindPersonIdInput").value = "";
            document.getElementById("bindPersonForm").style.display = "none";
            if(!currentPersonId) localStorage.setItem(STORAGE_KEYS.lastPerson(currentUser), pid);
            await loadAllPersonData();
            setTip(`绑定成功，现在可查看${target.name}的运动记录`);
        }catch(err){
            console.error(err);
            setTip(`绑定失败：${err.message || "请稍后重试"}`, true);
        }
    }

    async function deletePerson(pid){
        if(!confirm("删除后该孩子所有运动记录将全部清除，确定？")) return;
        try{
            const data = await fetchPersonData();
            let allPersons = (data.allPersons || []).filter(p=>p.personId !== pid);
            let bindPids = (data.bindPids || []).filter(id => id !== pid);
            if(isLocalEnv){
                localStorage.setItem(STORAGE_KEYS.allPersons, JSON.stringify(allPersons));
                localStorage.setItem(STORAGE_KEYS.userBindPersons(currentUser), JSON.stringify(bindPids));
                localStorage.removeItem(STORAGE_KEYS.personRecords(pid));
            }else{
                const delRes = await fetch("/api/sport?mode=delPerson", {
                    method:"POST",
                    cache: "no-store",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({mode:"delPerson", delPid:pid, allPersons, user:currentUser})
                });
                if(!delRes.ok) throw new Error(`删除失败(${delRes.status})`);
                const delJson = await delRes.json().catch(() => ({}));
                if(delJson.success === false) throw new Error(delJson.error || "删除失败");
            }
            if(currentPersonId === pid){
                currentPersonId = "";
                sportList = [];
                renderDetailList(); renderAllChart();
            }
            const last = localStorage.getItem(STORAGE_KEYS.lastPerson(currentUser));
            if(last === pid) localStorage.removeItem(STORAGE_KEYS.lastPerson(currentUser));

            // 先用本地结果立刻刷新，避免仍显示已删孩子
            setPersonManageExpanded(true);
            renderPersonList(allPersons, bindPids);
            updatePageTitle();

            await loadAllPersonData();
            setTip("人员及对应运动记录已删除");
        }catch(err){
            console.error(err);
            setTip(`删除失败：${err.message || "请稍后重试"}`, true);
        }
    }

    async function loadPersonRecord(){
        if(!currentPersonId){sportList=[];return;}
        if(isLocalEnv){
            const local = localStorage.getItem(STORAGE_KEYS.personRecords(currentPersonId));
            sportList = local ? JSON.parse(local) : [];
            return;
        }
        try{
            const res = await fetch(`/api/sport?pid=${currentPersonId}`);
            const json = await res.json();
            sportList = json.data || [];
        }catch(e){
            sportList = [];
            setTip(`加载失败：${e.message}`,true);
        }
    }

    async function savePersonRecord(){
        if(!currentPersonId) return false;
        if(isLocalEnv){
            localStorage.setItem(STORAGE_KEYS.personRecords(currentPersonId), JSON.stringify(sportList));
            setTip("已保存至本地");
            return true;
        }
        try{
            const res = await fetch("/api/sport",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({list:sportList, pid:currentPersonId})
            })
            const json = await res.json();
            if(json.success){
                setTip("已保存至云端");
                return true;
            }else throw new Error("服务端存储失败");
        }catch(e){
            setTip(`云端保存失败：${e.message}`,true);
            return false;
        }
    }

    async function addSportRecord(){
        if(!currentPersonId){setTip("请先在上方选择要录入的孩子",true);return;}
        const type = document.getElementById('sportType').value;
        const date = document.getElementById('checkDate').value;
        const time = document.getElementById('sportTime').value.trim();
        // 数量合计、最优成绩、备注均为选填，允许为空
        const dist = document.getElementById('sportDist').value.trim();
        const bestScore = document.getElementById('bestScore').value.trim();
        const note = document.getElementById('sportNote').value.trim();
        if(!time){setTip("请填写运动时长",true);return;}
        if(!date){setTip("请选择打卡日期",true);return;}
        sportList.push({type,time,dist,bestScore,note,date});
        const ok = await savePersonRecord();
        if(ok){
            localStorage.setItem(STORAGE_KEYS.lastSportType(currentUser), type);
            document.getElementById('sportType').value = type; // 保持为上一次运动
            document.getElementById('sportTime').value = "";
            document.getElementById('sportDist').value = "";
            document.getElementById('bestScore').value = "";
            document.getElementById('sportNote').value = "";
            document.getElementById('checkDate').value = getTodayDate();
            renderDetailList(); renderAllChart();
            setTip(`保存成功：${type} ${time}分钟`);
        }
    }

    async function delRecord(idx){
        sportList.splice(idx,1);
        await savePersonRecord();
        renderDetailList(); renderAllChart();
    }

    async function saveEditRecord(){
        if(editingRecordIndex < 0 || !sportList[editingRecordIndex]){
            setTip("没有可修改的记录", true);
            return;
        }
        const type = document.getElementById("editSportType").value;

        const dist = document.getElementById("editSportDist").value.trim();
        const bestScore = document.getElementById("editBestScore").value.trim();
        const note = document.getElementById("editSportNote").value.trim();

    async function batchDelete(){
        const chks = document.querySelectorAll(".check-item:checked");
        if(chks.length===0){setTip("请勾选要删除的记录",true);return;}
        const idxs = Array.from(chks).map(c=>Number(c.value)).sort((a,b)=>b-a);

    function getMonthAgoDate(){
        const d = new Date();
        d.setMonth(d.getMonth() - 1);
        const y = d.getFullYear();
        let m = d.getMonth()+1, day = d.getDate();
        m = m<10?"0"+m:m; day = day<10?"0"+day:day;
        return `${y}-${m}-${day}`;
    }
    function ensureDetailFilterDefaults(){
        const startEl = document.getElementById("detailStartDate");
        const endEl = document.getElementById("detailEndDate");
        if(!startEl || !endEl) return;
        if(!endEl.value) endEl.value = getTodayDate();
        if(!startEl.value) startEl.value = getMonthAgoDate();
    }
    function fillDetailTypeFilter(){
        const sel = document.getElementById("detailFilterType");
        if(!sel) return;
        const prev = sel.value;
        const typeSet = new Set(sportTypeList || DEFAULT_SPORT_TYPES);
        sportList.forEach(it => {
            if(it && it.type) typeSet.add(it.type);
        });
        const types = Array.from(typeSet).sort((a,b)=>a.localeCompare(b,"zh"));
        sel.innerHTML = "";
        const allOpt = document.createElement("option");
        allOpt.value = "";
        allOpt.textContent = "全部类型";
        sel.appendChild(allOpt);
        types.forEach(t => {
            const opt = document.createElement("option");
            opt.value = t;
            opt.textContent = t;
            sel.appendChild(opt);
        });
        sel.value = (prev === "" || types.includes(prev)) ? prev : "";
    }
    function getFilteredDetailRows(){
        ensureDetailFilterDefaults();
        const typeFilter = document.getElementById("detailFilterType")?.value || "";
        const start = document.getElementById("detailStartDate")?.value || "";
        const end = document.getElementById("detailEndDate")?.value || "";
        const rows = sportList
            .map((item, index) => ({ item, index }))
            .filter(({ item }) => {
                if(!item || !item.date) return false;
                if(typeFilter && item.type !== typeFilter) return false;
                if(start && item.date < start) return false;
                if(end && item.date > end) return false;
                return true;
            });
        rows.sort((a, b) => {
            if(a.item.date !== b.item.date) return b.item.date.localeCompare(a.item.date);
            return b.index - a.index;
        });
        return rows;
    }
    function buildDetailRowHtml(item, index){
        return `
            <div class="list-item-with-check">
                <input type="checkbox" class="check-item" value="${index}">
                <div style="flex:1;">
                    <div>打卡日期：${escapeHtml(item.date)}</div>
                    <div>项目：${escapeHtml(item.type)} | 时长：${escapeHtml(item.time)}分钟</div>
                    <div>数量合计：${escapeHtml(item.dist||"无")} | 最优成绩：${escapeHtml(item.bestScore||"无")}</div>
                    <div>备注：${escapeHtml(item.note||"无")}</div>
                </div>
                <div class="record-actions">
                    <button type="button" class="edit-btn" data-editidx="${index}">修改</button>
                    <button type="button" class="del-btn" data-delidx="${index}">删除</button>
                </div>
            </div>
        `;
    }
    function bindDetailListEvents(wrap){
        wrap.onclick = function(e){
            if(e.target.dataset.editidx !== undefined){
                openEditRecord(Number(e.target.dataset.editidx));
                return;
            }
            const idx = e.target.dataset.delidx;
            if(idx !== undefined) delRecord(Number(idx));
        };

            chk.addEventListener("change", syncDetailSelectAllState);
        });

    function syncDetailSelectAllState(){
        const all = document.querySelectorAll("#detailRecordList .check-item");
        const checked = document.querySelectorAll("#detailRecordList .check-item:checked");
        const selectAll = document.getElementById("detailSelectAll");
        if(!selectAll) return;
        selectAll.checked = all.length > 0 && all.length === checked.length;
        selectAll.indeterminate = checked.length > 0 && checked.length < all.length;
    }
    function toggleDetailSelectAll(){
        const checked = document.getElementById("detailSelectAll").checked;
        document.querySelectorAll("#detailRecordList .check-item").forEach(chk => {
            chk.checked = checked;
        });
        syncDetailSelectAllState();
    }
    function renderDetailList(){
        const wrap = document.getElementById("detailRecordList");
        if(!wrap) return;
        fillDetailTypeFilter();
        ensureDetailFilterDefaults();
        const rows = getFilteredDetailRows();
        const selectAll = document.getElementById("detailSelectAll");
        if(selectAll){
            selectAll.checked = false;
            selectAll.indeterminate = false;
        }
        if(rows.length===0){
            wrap.innerHTML = "<p style='color:#64748b;'>暂无符合条件的运动记录</p>";
            return;
        }
        const mergeByDate = document.getElementById("detailMergeByDate")?.checked !== false;
        let html = "";
        if(mergeByDate){
            const groups = [];
            const map = new Map();
            rows.forEach(row => {
                if(!map.has(row.item.date)){
                    const g = { date: row.item.date, rows: [] };
                    map.set(row.item.date, g);
                    groups.push(g);
                }
                map.get(row.item.date).rows.push(row);
            });
            groups.forEach(g => {
                html += `
                    <div class="detail-date-group">
                        <div class="detail-date-title">${escapeHtml(g.date)}（${g.rows.length}条）</div>
                        ${g.rows.map(r => buildDetailRowHtml(r.item, r.index)).join("")}
                    </div>
                `;
            });
        }else{
            html = rows.map(r => buildDetailRowHtml(r.item, r.index)).join("");
        }
        wrap.innerHTML = html;
        bindDetailListEvents(wrap);
    }
    function exportExcel(){
        const chks = document.querySelectorAll("#detailRecordList .check-item:checked");

    function switchDayRange(range){
        dayChartRange = range === "all" ? "all" : Number(range);
        chartCustomStart = "";
        chartCustomEnd = "";
        document.querySelectorAll("#dayRangeBtns .chart-switch-btn[data-day-range]").forEach(b=>{
            b.classList.toggle("active", String(b.dataset.dayRange) === String(range));
        });
        document.getElementById("btnApplyChartRange").classList.remove("active");
        renderDayTimeChart();
        renderSportSummary();
    }
    function applyCustomChartRange(){
        const start = document.getElementById("chartStartDate").value;
        const end = document.getElementById("chartEndDate").value;
        if(!start || !end){setTip("请选择开始和结束日期",true);return;}
        if(start > end){setTip("开始日期不能晚于结束日期",true);return;}
        dayChartRange = "custom";
        chartCustomStart = start;
        chartCustomEnd = end;
        document.querySelectorAll("#dayRangeBtns .chart-switch-btn[data-day-range]").forEach(b=>b.classList.remove("active"));
        document.getElementById("btnApplyChartRange").classList.add("active");
        renderDayTimeChart();
        renderSportSummary();
        setTip(`已筛选：${start} 至 ${end}`);
    }
    function getChartRangeBounds(){
        const today = getTodayDate();
        if(dayChartRange === "custom"){
            return {
                start: chartCustomStart,
                end: chartCustomEnd,
                label: `${chartCustomStart.slice(5)}~${chartCustomEnd.slice(5)}`,
                fillEmpty: true,
            };
        }
        if(dayChartRange === "all"){
            const allDays = Array.from(new Set(sportList.map(it=>it.date).filter(Boolean))).sort();
            return {
                start: allDays[0] || today,
                end: allDays[allDays.length-1] || today,
                label: "全部",
                fillEmpty: false,
                dates: allDays.length ? allDays : [today],
            };
        }
        const start = getDateOffset(today, -(dayChartRange - 1));
        return {
            start,
            end: today,
            label: `近${dayChartRange}天`,
            fillEmpty: true,
        };
    }
    function getDateOffset(dateStr, offsetDays){
        const d = new Date(dateStr + "T00:00:00");
        d.setDate(d.getDate() + offsetDays);
        const y = d.getFullYear();
        let m = d.getMonth()+1, day = d.getDate();
        m = m<10?"0"+m:m; day = day<10?"0"+day:day;
        return `${y}-${m}-${day}`;
    }
    function buildDateRange(startDate, endDate){
        const list = [];
        let cur = startDate;
        while(cur <= endDate){
            list.push(cur);
            cur = getDateOffset(cur, 1);
        }
        return list;
    }
    function getFilteredSportList(){
        const bounds = getChartRangeBounds();
        return sportList.filter(it=>it.date >= bounds.start && it.date <= bounds.end);
    }
    function renderDayTimeChart(){
        const bounds = getChartRangeBounds();
        const dates = bounds.dates
            ? bounds.dates
            : buildDateRange(bounds.start, bounds.end);
        const dayMap = {};
        const sportTypes = new Set();
        dates.forEach(d=>dayMap[d]={});
        sportList.forEach(it=>{
            if(dayMap[it.date] === undefined) return;
            const s = it.type || "其他";
            sportTypes.add(s);
            dayMap[it.date][s] = (dayMap[it.date][s]||0) + (Number(it.time)||0);
        });
        const sportArr = Array.from(sportTypes);
        const colorBySport = buildSportColorLookup(sportArr);
        const totals = dates.map(d=>sportArr.reduce((sum,sp)=>sum+(dayMap[d][sp]||0),0));
        const datasets = sportArr.length
            ? sportArr.map((sp)=>({
                label: sp,
                data: dates.map(d=>dayMap[d][sp]||0),
                backgroundColor: colorBySport[sp] || "#64748b",
                stack: "day",
                maxBarThickness: 32,
                borderWidth: 0,
            }))
            : [{
                label: "运动时长",
                data: dates.map(()=>0),
                backgroundColor: "#2563eb",
                stack: "day",
                maxBarThickness: 32,
            }];
        const rangeLabel = bounds.label;
        if(dayChartInstance) dayChartInstance.destroy();
        const ctx = document.getElementById("dayTimeChart").getContext("2d");
        dayChartInstance = new Chart(ctx,{
            type:"bar",
            data:{labels: dates.map(d=>d.slice(5)), datasets},
            options:{
                responsive:true,
                maintainAspectRatio:false,
                layout:{padding:{top:18,right:4,bottom:0,left:0}},
                plugins:{
                    title:{display:true,text:`每日运动时长（${rangeLabel}）`,font:{size:15}},
                    legend:{display:sportArr.length>1, position:"top", labels:{boxWidth:12, font:{size:11}}},
                    tooltip:{
                        callbacks:{
                            footer:(items)=>{
                                const total = items.reduce((s,it)=>s+(it.parsed.y||0),0);
                                return total ? `合计：${total} 分钟` : "";
                            }
                        }
                    },
                    dayTotalLabels:{ totals }
                },
                scales:{
                    x:{
                        stacked:true,
                        title:{display:true,text:"日期",font:{size:12}},
                        ticks:{
                            autoSkip:true,
                            maxTicksLimit: dates.length > 14 ? 8 : dates.length,
                            maxRotation:0,
                            minRotation:0,
                            font:{size:11},
                        },
                    },
                    y:{
                        stacked:true,
                        title:{display:true,text:"时长 (分钟)",font:{size:12}},
                        min:0,
                        ticks:{precision:0,font:{size:11}},
                    },
                },
            },
            plugins:[{
                id:"dayTotalLabels",
                afterDatasetsDraw(chart){
                    const totals = chart.options.plugins.dayTotalLabels?.totals || [];
                    const {ctx, scales} = chart;
                    if(!scales.x || !scales.y) return;
                    ctx.save();
                    ctx.font = "12px system-ui,sans-serif";
                    ctx.fillStyle = "#1e293b";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "bottom";
                    totals.forEach((total,i)=>{
                        if(!total) return;
                        const x = scales.x.getPixelForValue(i);
                        const y = scales.y.getPixelForValue(total);
                        ctx.fillText(String(total), x, y - 4);
                    });
                    ctx.restore();
                }
            }]
        });
    }
    const SPORT_COLOR_MAP = {
        "跑步":"#f97316",
        "骑自行车":"#2563eb",
        "爬山":"#16a34a",
        "羽毛球":"#eab308",
        "徒步":"#0d9488",
        "游泳":"#06b6d4",
        "跳绳":"#ec4899",
        "跳操":"#8b5cf6",
        "其他":"#64748b",
    };
    const SPORT_COLOR_FALLBACK = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4","#84cc16"];
    function buildSportColorLookup(sportArr){
        const lookup = {};
        (sportArr || []).forEach((sp, idx)=>{
            lookup[sp] = SPORT_COLOR_MAP[sp] || SPORT_COLOR_FALLBACK[idx % SPORT_COLOR_FALLBACK.length];
        });
        return lookup;
    }
    function collectSportTypesInChartRange(){
        const bounds = getChartRangeBounds();
        const dates = bounds.dates
            ? bounds.dates
            : buildDateRange(bounds.start, bounds.end);
        const dateSet = new Set(dates);
        const sportTypes = new Set();
        sportList.forEach(it=>{
            if(!dateSet.has(it.date)) return;
            sportTypes.add(it.type || "其他");
        });
        return Array.from(sportTypes);
    }
    function renderSportSummary(){
        const wrap = document.getElementById("sportSummaryWrap");
        sportTypeChartInstances.forEach(c=>{ try{c.destroy();}catch(e){} });
        sportTypeChartInstances = [];
        const list = getFilteredSportList();
        if(list.length===0){
            wrap.innerHTML = "<p style='color:#64748b;'>当前周期暂无运动记录</p>";
            return;
        }
        const bySport = {};
        list.forEach(it=>{
            const s = it.type || "其他";
            if(!bySport[s]) bySport[s] = {};
            const d = it.date;
            if(!bySport[s][d]) bySport[s][d] = {time:0, dists:[]};
            bySport[s][d].time += Number(it.time) || 0;
            const dist = (it.dist||"").trim();
            if(dist) bySport[s][d].dists.push(dist);
        });
        // 与上方堆叠图同一套类型顺序和颜色
        const sportArrForColor = collectSportTypesInChartRange();
        const colorBySport = buildSportColorLookup(sportArrForColor);
        const sports = sportArrForColor.filter(sp => bySport[sp]);
        Object.keys(bySport).forEach(sp=>{
            if(!sports.includes(sp)) sports.push(sp);
        });
        wrap.innerHTML = sports.map((sp,idx)=>{
            const color = colorBySport[sp] || SPORT_COLOR_FALLBACK[idx % SPORT_COLOR_FALLBACK.length];
            return `
                <div class="sport-type-chart-block">
                    <div class="sport-type-chart-title" style="color:${color}">${sp}</div>
                    <div class="sport-type-chart-wrap"><canvas id="sportTypeChart_${idx}"></canvas></div>
                </div>
            `;
        }).join("");

        sports.forEach((sp,idx)=>{
            const dayMap = bySport[sp];
            const dates = Object.keys(dayMap).sort(); // 仅有该运动的日期
            const times = dates.map(d=>dayMap[d].time);
            const qtyLabels = dates.map(d=>dayMap[d].dists.length ? dayMap[d].dists.join("、") : "");
            const color = colorBySport[sp] || SPORT_COLOR_FALLBACK[idx % SPORT_COLOR_FALLBACK.length];
            const canvas = document.getElementById(`sportTypeChart_${idx}`);
            if(!canvas) return;
            const chart = new Chart(canvas.getContext("2d"),{
                type:"bar",
                data:{
                    labels: dates.map(d=>d.slice(5)),
                    datasets:[{
                        label:"时长(分钟)",
                        data: times,
                        backgroundColor: color,
                        borderRadius:4,
                        maxBarThickness:36,
                    }]
                },
                options:{
                    responsive:true,
                    maintainAspectRatio:false,
                    layout:{padding:{top:16,right:4,bottom:0,left:0}},
                    plugins:{
                        legend:{display:false},
                        tooltip:{
                            callbacks:{
                                afterBody:(items)=>{
                                    const i = items[0]?.dataIndex;
                                    if(i===undefined) return "";
                                    const q = qtyLabels[i];
                                    return q ? `数量：${q}` : "";
                                }
                            }
                        },
                        barValueLabels:{ values: times }
                    },
                    scales:{
                        x:{title:{display:true,text:"日期",font:{size:11}}, ticks:{font:{size:11},maxRotation:0}},
                        y:{title:{display:true,text:"时长(分钟)",font:{size:11}}, min:0, ticks:{precision:0,font:{size:11}}},
                    }
                },
                plugins:[{
                    id:"barValueLabels",
                    afterDatasetsDraw(chart){
                        const values = chart.options.plugins.barValueLabels?.values || [];
                        const {ctx, scales} = chart;
                        if(!scales.x || !scales.y) return;
                        ctx.save();
                        ctx.font = "12px system-ui,sans-serif";
                        ctx.fillStyle = "#1e293b";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "bottom";
                        values.forEach((v,i)=>{
                            if(!v) return;
                            const x = scales.x.getPixelForValue(i);
                            const y = scales.y.getPixelForValue(v);
                            ctx.fillText(String(v), x, y - 4);
                        });
                        ctx.restore();
                    }
                }]
            });
            sportTypeChartInstances.push(chart);
        });
    }
    function renderBestScorePanel(){
        const bestMap = {};
        sportList.forEach(it=>{
            const s = it.type; const sc = it.bestScore?.trim();
            if(!sc) return;
            if(!bestMap[s] || bestMap[s].score < sc){
                bestMap[s] = {score:sc,date:it.date};
            }
        })
        const wrap = document.getElementById("bestScoreWrap");
        if(Object.keys(bestMap).length===0){wrap.innerHTML="<p style='color:#64748b;'>暂无最优成绩记录</p>";return;}
        let html = "";
        Object.keys(bestMap).forEach(sp=>{
            const info = bestMap[sp];
            html += `
                <div class="best-score-item">
                    <div class="best-score-name">${sp}</div>
                    <div>最优成绩：${info.score}</div>
                    <div style="font-size:13px;color:#666;">记录日期：${info.date}</div>
                </div>
            `
        })
        wrap.innerHTML = html;
    }
    function renderAllChart(){
        renderDayTimeChart(); renderSportSummary(); renderBestScorePanel();
    }

    document.querySelectorAll('.top-btn-row button[data-tab]').forEach(btn=>{
        btn.onclick = ()=>{
            const tab = btn.dataset.tab;
            document.querySelectorAll('.top-btn-row button[data-tab]').forEach(b=>b.classList.remove("active"));
            document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById(tab).classList.add("active");
            if(tab==="chart") renderAllChart();
            if(tab==="detail"){
                ensureDetailFilterDefaults();
                renderDetailList();
            }
        }
    })

    // 脚本在 body 末尾，元素已存在，直接绑定更可靠
    document.getElementById("linkReg").onclick = switchAuthTab;
    document.getElementById("linkLogin").onclick = switchAuthTab;
    document.getElementById("btnLogin").onclick = userLogin;
    document.getElementById("btnRegister").onclick = userRegister;
    document.getElementById("btnLogout").onclick = logout;
    document.getElementById("btnAdminLogout").onclick = logout;
    document.getElementById("btnTogglePersonManage").onclick = togglePersonManage;
    document.getElementById("btnCreatePerson").onclick = openCreatePerson;
    document.getElementById("btnBindPerson").onclick = bindPersonById;
    document.getElementById("btnSaveNewPerson").onclick = createNewPerson;
    document.getElementById("btnDoBind").onclick = bindPerson;
    document.getElementById("btnAddRecord").onclick = addSportRecord;
    document.getElementById("btnAddSportType").onclick = addCustomSportType;
    document.getElementById("btnSaveEditRecord").onclick = saveEditRecord;
    document.getElementById("btnCancelEditRecord").onclick = closeEditRecord;
    document.getElementById("editRecordModal").addEventListener("click", (e)=>{
        if(e.target.id === "editRecordModal") closeEditRecord();
    });
    document.getElementById("btnExport").onclick = exportExcel;
    document.getElementById("btnBatchDel").onclick = batchDelete;
    document.getElementById("detailSelectAll").onchange = toggleDetailSelectAll;
    document.getElementById("detailMergeByDate").onchange = renderDetailList;
    document.getElementById("detailFilterType").onchange = renderDetailList;
    document.getElementById("detailStartDate").onchange = renderDetailList;
    document.getElementById("detailEndDate").onchange = renderDetailList;
    document.querySelectorAll("#dayRangeBtns .chart-switch-btn[data-day-range]").forEach(b=>{
        b.onclick = ()=>switchDayRange(b.dataset.dayRange);
    });
    document.getElementById("btnApplyChartRange").onclick = applyCustomChartRange;

    window.onload = async ()=>{
        document.getElementById("checkDate").value = getTodayDate();
        ensureDetailFilterDefaults();
        await initSportTypeSelect();
        try {
            const savedUser = localStorage.getItem(STORAGE_KEYS.loginUser);
            if (isAdminAccount(savedUser)) {
                await enterAdmin();
                setTip("管理员已登录");
                return;
            }
            if (savedUser && checkPhone(normalizePhone(savedUser))) {
                // 线上以云端账号为准；本地环境再校验本地 userMap
                if (isLocalEnv) {
                    const allUserRaw = localStorage.getItem(STORAGE_KEYS.allUser) || "{}";
                    const allUserObj = JSON.parse(allUserRaw);
                    if (!Object.keys(allUserObj).includes(savedUser)) {
                        setTip("请登录账号查看");
                        return;
                    }
                }
                await enterApp(normalizePhone(savedUser));
                setTip(`欢迎回来：${normalizePhone(savedUser)}`);
                return;
            }
            setTip("请登录账号查看");
        } catch (err) {
            setTip("页面加载完成，请登录账号");
            console.error(err);
        }
    }
</script>
