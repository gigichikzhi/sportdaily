<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌娃运动打卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: #f7faff;
            padding: 24px 16px;
            max-width: 820px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2563eb;
            font-size: 26px;
            margin-bottom: 12px;
        }
        .tip-text {
            text-align: center;
            color: #16a34a;
            font-size: 15px;
            margin-bottom: 20px;
            min-height: 22px;
        }
        .tab-wrap {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
        }
        .tab-btn {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 10px 10px 0 0;
            font-size: 17px;
            cursor: pointer;
            background: #e2e8f0;
            color: #475569;
        }
        .tab-btn.active {
            background: #2563eb;
            color: white;
        }
        .card {
            background: white;
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1e293b;
        }
        .form-item {
            margin-bottom: 16px;
        }
        .form-item label {
            display: block;
            font-size: 15px;
            color: #334155;
            margin-bottom: 8px;
        }
        .form-item input,
        .form-item select,
        .form-item textarea {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
        }
        .submit-cloud-btn {
            width: 100%;
            padding: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
        }
        .list-item {
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .del-btn {
            padding: 8px 16px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .tab-panel {
            display: none;
        }
        .tab-panel.active {
            display: block;
        }
    </style>
</head>
<body>
    <h1>萌娃运动打卡</h1>
    <div class="tip-text" id="tip">加载中...</div>
    <div style="display: flex; gap:12px; margin-bottom:20px;">
        <button class="cloud-btn" onclick="fetchCloudData()" style="flex:1; padding:14px; background:#38bdf8; border:none; border-radius:10px; color:white; font-size:16px;">拉取云端数据</button>
        <button class="cloud-btn" onclick="saveAllToCloud()" style="flex:1; padding:14px; background:#0ea5e9; border:none; border-radius:10px; color:white; font-size:16px;">保存全部到云端</button>
    </div>

    <div class="tab-wrap">
        <button class="tab-btn active" data-tab="input">每日打卡录入</button>
        <button class="tab-btn" data-tab="chart">运动统计报表</button>
    </div>

    <!-- 录入面板 -->
    <div class="tab-panel active" id="input">
        <div class="card">
            <div class="card-title">添加当日运动项目</div>
            <div class="form-item">
                <label>运动类型</label>
                <select id="sportType">
                    <option value="跑步">跑步</option>
                    <option value="骑自行车">骑自行车</option>
                    <option value="爬山">爬山</option>
                    <option value="羽毛球">羽毛球</option>
                    <option value="徒步">徒步</option>
                    <option value="游泳">游泳</option>
                    <option value="跳绳">跳绳</option>
                    <option value="健身">健身</option>
                </select>
            </div>
            <div class="form-item">
                <label>运动时长 (分钟)</label>
                <input type="number" id="sportTime" placeholder="请输入时长">
            </div>
            <div class="form-item">
                <label>次数/距离 (选填)</label>
                <input type="text" id="sportDist" placeholder="例如：5公里 / 3组">
            </div>
            <div class="form-item">
                <label>备注: 孩子运动状态、天气、进步情况</label>
                <textarea id="sportNote" rows="4"></textarea>
            </div>
            <button class="submit-cloud-btn" onclick="addSportRecord()">添加本条记录（直接存入云端）</button>
        </div>
        <div class="card">
            <div class="card-title">当日运动清单</div>
            <div id="recordList"></div>
        </div>
    </div>

    <!-- 统计面板 -->
    <div class="tab-panel" id="chart">
        <div class="card">
            <div class="card-title">云端运动统计</div>
            <p>切换设备后，点击「拉取云端数据」即可查看全部打卡记录</p>
        </div>
    </div>

<script>
    const tipDom = document.getElementById('tip');
    let sportList = [];

    // 切换标签
    document.querySelectorAll('.tab-btn').forEach(btn=>{
        btn.onclick = ()=>{
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }
    })

    // 从云端拉取数据
    async function fetchCloudData(){
        tipDom.textContent = "正在拉取云端数据...";
        try{
            const res = await fetch("/api/sport");
            if(!res.ok) throw new Error("接口异常");
            const json = await res.json();
            sportList = json.data || [];
            renderList();
            tipDom.textContent = "拉取云端数据成功";
        }catch(e){
            tipDom.textContent = "云端访问失败，请检查部署";
        }
    }

    // 保存全部列表到云端
    async function saveAllToCloud(){
        tipDom.textContent = "正在上传全部数据到云端...";
        try{
            const res = await fetch("/api/sport",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({list:sportList})
            });
            const json = await res.json();
            if(json.success){
                tipDom.textContent = "已全部保存至云端，其他设备可同步";
            }else{
                tipDom.textContent = "云端保存失败";
            }
        }catch(e){
            tipDom.textContent = "云端访问失败，请检查部署";
        }
    }

    // 新增一条运动记录（直接进数组，必须点保存全部到云端才会持久化）
    function addSportRecord(){
        const type = document.getElementById('sportType').value;
        const time = document.getElementById('sportTime').value.trim();
        const dist = document.getElementById('sportDist').value.trim();
        const note = document.getElementById('sportNote').value.trim();
        if(!time){
            tipDom.textContent = "请填写运动时长";
            return;
        }
        sportList.push({
            type, time, dist, note,
            date: new Date().toLocaleDateString()
        });
        // 清空输入框
        document.getElementById('sportTime').value = "";
        document.getElementById('sportDist').value = "";
        document.getElementById('sportNote').value = "";
        renderList();
        tipDom.textContent = "已新增记录，点击「保存全部到云端」永久存储";
    }

    // 删除单条记录
    function delRecord(index){
        sportList.splice(index,1);
        renderList();
        tipDom.textContent = "已删除本条，记得保存到云端";
    }

    // 渲染列表
    function renderList(){
        const wrap = document.getElementById('recordList');
        if(sportList.length === 0){
            wrap.innerHTML = "<p style='color:#64748b;'>暂无运动记录</p>";
            return;
        }
        let html = "";
        sportList.forEach((item,idx)=>{
            html += `
                <div class="list-item">
                    <div>
                        <div>项目：${item.type} | 时长：${item.time}分钟</div>
                        <div>数量：${item.dist||"无"} | 备注：${item.note||"无"}</div>
                        <div style="font-size:13px; color:#666;">日期：${item.date}</div>
                    </div>
                    <button class="del-btn" onclick="delRecord(${idx})">删除本条</button>
                </div>
            `;
        })
        wrap.innerHTML = html;
    }

    // 页面加载自动拉取云端
    window.onload = ()=>{
        fetchCloudData();
    }
</script>
</body>
</html>
